openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PGPDeco Factory Performance Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: operators
    description: Operator management
  - name: records
    description: Production records
  - name: settings
    description: Score configuration
  - name: shifts
    description: Shift executives
  - name: rankings
    description: Rankings and statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /operators:
    get:
      operationId: listOperators
      tags: [operators]
      summary: List all operators
      responses:
        "200":
          description: List of operators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Operator"
    post:
      operationId: createOperator
      tags: [operators]
      summary: Create a new operator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operator"

  /operators/{id}:
    patch:
      operationId: updateOperator
      tags: [operators]
      summary: Update an operator
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operator"
        "404":
          description: Not found
    delete:
      operationId: deleteOperator
      tags: [operators]
      summary: Delete an operator
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /records:
    get:
      operationId: listRecords
      tags: [records]
      summary: List production records with optional filters
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: shift
          in: query
          schema:
            type: ["string", "null"]
        - name: shiftGroup
          in: query
          schema:
            type: ["string", "null"]
        - name: machine
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of production records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductionRecord"
    post:
      operationId: createRecord
      tags: [records]
      summary: Create a new production record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionRecord"

  /records/{id}:
    patch:
      operationId: updateRecord
      tags: [records]
      summary: Update a production record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionRecord"
        "404":
          description: Not found
    delete:
      operationId: deleteRecord
      tags: [records]
      summary: Delete a production record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /settings/machines:
    get:
      operationId: listMachineSettings
      tags: [settings]
      summary: Get scoring settings for all machines
      responses:
        "200":
          description: Machine settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MachineSettings"

  /settings/machines/{machine}:
    put:
      operationId: updateMachineSettings
      tags: [settings]
      summary: Update scoring settings for a machine
      parameters:
        - name: machine
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineSettingsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MachineSettings"

  /shifts/executives:
    get:
      operationId: listShiftExecutives
      tags: [shifts]
      summary: Get all shift executives
      responses:
        "200":
          description: List of shift executives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShiftExecutive"

  /shifts/executives/{shiftGroup}:
    put:
      operationId: updateShiftExecutive
      tags: [shifts]
      summary: Update executive name for a shift
      parameters:
        - name: shiftGroup
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShiftExecutiveInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftExecutive"

  /rankings/operators:
    get:
      operationId: getOperatorRankings
      tags: [rankings]
      summary: Get operator rankings with scores calculated dynamically
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: month
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Operator rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OperatorRanking"

  /rankings/shifts:
    get:
      operationId: getShiftRankings
      tags: [rankings]
      summary: Get shift rankings with scores calculated dynamically
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Shift rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShiftRanking"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [rankings]
      summary: Get aggregated dashboard statistics
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
      required:
        - id
        - username

    Operator:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        shiftGroup:
          type: string
          description: "A, B, C, or D"
      required:
        - id
        - name
        - shiftGroup

    OperatorInput:
      type: object
      properties:
        name:
          type: string
        shiftGroup:
          type: string
      required:
        - name
        - shiftGroup

    OperatorUpdate:
      type: object
      properties:
        name:
          type: string
        shiftGroup:
          type: string

    ProductionRecord:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          description: ISO date string YYYY-MM-DD
        shift:
          type: string
          description: "Morning, Afternoon, or Night"
        shiftGroup:
          type: string
          description: "A, B, C, or D"
        machine:
          type: string
          description: "Techno 5 or Kammann"
        operator1Id:
          type: ["integer", "null"]
        operator2Id:
          type: ["integer", "null"]
        operator1Name:
          type: ["string", "null"]
        operator2Name:
          type: ["string", "null"]
        targetQty:
          type: integer
        actualQty:
          type: integer
        defectPercentage:
          type: number
          description: Total defect percentage (0-100)
        score:
          type: ["number", "null"]
          description: Dynamically calculated score
      required:
        - id
        - date
        - shift
        - shiftGroup
        - machine
        - targetQty
        - actualQty
        - defectPercentage

    RecordInput:
      type: object
      properties:
        date:
          type: string
        shift:
          type: string
        shiftGroup:
          type: string
        machine:
          type: string
        operator1Id:
          type: ["integer", "null"]
        operator2Id:
          type: ["integer", "null"]
        targetQty:
          type: integer
        actualQty:
          type: integer
        defectPercentage:
          type: number
      required:
        - date
        - shift
        - shiftGroup
        - machine
        - targetQty
        - actualQty
        - defectPercentage

    RecordUpdate:
      type: object
      properties:
        date:
          type: string
        shift:
          type: string
        shiftGroup:
          type: string
        machine:
          type: string
        operator1Id:
          type: ["integer", "null"]
        operator2Id:
          type: ["integer", "null"]
        targetQty:
          type: integer
        actualQty:
          type: integer
        defectPercentage:
          type: number

    MachineSettings:
      type: object
      properties:
        machine:
          type: string
        pc:
          type: number
          description: Production Constant
        qc:
          type: number
          description: Quality Constant
        k:
          type: number
          description: Defect Penalty Factor
        wp:
          type: number
          description: Production Weight
        wq:
          type: number
          description: Quality Weight
        c:
          type: number
          description: Carry Bonus Factor
      required:
        - machine
        - pc
        - qc
        - k
        - wp
        - wq
        - c

    MachineSettingsInput:
      type: object
      properties:
        pc:
          type: number
        qc:
          type: number
        k:
          type: number
        wp:
          type: number
        wq:
          type: number
        c:
          type: number
      required:
        - pc
        - qc
        - k
        - wp
        - wq
        - c

    ShiftExecutive:
      type: object
      properties:
        shiftGroup:
          type: string
        executiveName:
          type: string
      required:
        - shiftGroup
        - executiveName

    ShiftExecutiveInput:
      type: object
      properties:
        executiveName:
          type: string
      required:
        - executiveName

    OperatorRanking:
      type: object
      properties:
        rank:
          type: integer
        operatorId:
          type: integer
        operatorName:
          type: string
        shiftGroup:
          type: string
        avgScore:
          type: number
        totalRecords:
          type: integer
        totalActual:
          type: integer
        avgDefectPercentage:
          type: number
        machines:
          type: array
          items:
            type: string
      required:
        - rank
        - operatorId
        - operatorName
        - shiftGroup
        - avgScore
        - totalRecords
        - totalActual
        - avgDefectPercentage
        - machines

    ShiftRanking:
      type: object
      properties:
        rank:
          type: integer
        shiftGroup:
          type: string
        executiveName:
          type: string
        avgScore:
          type: ["number", "null"]
        totalRecords:
          type: integer
        totalActual:
          type: integer
        defectRate:
          type: number
        efficiency:
          type: number
      required:
        - rank
        - shiftGroup
        - executiveName
        - totalRecords
        - totalActual
        - defectRate
        - efficiency

    MachineSummary:
      type: object
      properties:
        machine:
          type: string
        totalActual:
          type: integer
        totalTarget:
          type: integer
        records:
          type: integer
        defectRate:
          type: number
        efficiencyPct:
          type: number
      required:
        - machine
        - totalActual
        - totalTarget
        - records
        - defectRate
        - efficiencyPct

    TopOperator:
      type: object
      properties:
        rank:
          type: integer
        operatorId:
          type: integer
        operatorName:
          type: string
        avgScore:
          type: number
        shiftGroup:
          type: string
      required:
        - rank
        - operatorId
        - operatorName
        - avgScore
        - shiftGroup

    DashboardStats:
      type: object
      properties:
        totalActual:
          type: integer
        totalTarget:
          type: integer
        overallEfficiency:
          type: number
        defectRate:
          type: number
        machineSummary:
          type: array
          items:
            $ref: "#/components/schemas/MachineSummary"
        top5Operators:
          type: array
          items:
            $ref: "#/components/schemas/TopOperator"
      required:
        - totalActual
        - totalTarget
        - overallEfficiency
        - defectRate
        - machineSummary
        - top5Operators
